  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;

<body>
  <p>Opening Spotify…</p>

  <script>
    // Fire Pixel ViewContent event
    fbq('track', 'ViewContent', {
      content_name: 'Something In Between',
      content_category: 'Music',
      content_ids: ['sib_single_2026']
    });

    // Detect mobile for deep link vs web fallback
    var ua = navigator.userAgent || '';
    var isIOS = /iphone|ipad|ipod/i.test(ua);
    var isAndroid = /android/i.test(ua);

    var spotifyWeb = 'https://open.spotify.com/track/77CpblGVheQxfusN80JB3R';
    var spotifyApp = 'spotify:track:77CpblGVheQxfusN80JB3R';

    if (isIOS || isAndroid) {
      // Try app deep link first, fall back to web after 1.5s
      window.location = spotifyApp;
      setTimeout(function() {
        window.location = spotifyWeb;
      }, 1500);
    } else {
      // Desktop: go straight to web player
      window.location = spotifyWeb;
    }
  </script>
</body>
